<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBSS Import Stock Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #0ea5e9;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sarabun', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(14,165,233,0.04) 0%, transparent 50%);
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(17,24,39,0.8);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .header h1 { font-size: 14px; font-family: var(--mono); color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .header span { color: var(--muted); font-size: 12px; font-family: var(--mono); }
  .main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content:''; display:inline-block; width:3px; height:12px; background:var(--accent); border-radius:2px; }
  .tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tab {
    flex: 1; padding: 10px 16px; background: var(--surface2); border: none; color: var(--muted);
    font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all .2s;
    text-align: center; letter-spacing: 1px;
  }
  .tab.active { background: var(--accent); color: #000; font-weight: 700; }
  .tab:hover:not(.active) { background: var(--border); color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  input, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; color: var(--text); font-family: var(--mono); font-size: 13px;
    transition: border-color .2s; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,.12); }
  select option { background: var(--surface2); }
  .mat-info {
    background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0;
    padding: 10px 14px; font-family: var(--mono); font-size: 11px;
    display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px;
  }
  .mat-info span { color: var(--muted); }
  .mat-info strong { color: var(--text); }
  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-row input { width: 120px; }
  .qty-hint { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .btn {
    padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 1px; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00b8d9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,255,.3); }
  .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); background: rgba(0,212,255,.05); }
  .btn-row { display: flex; gap: 12px; margin-top: 20px; }
  .output-area {
    background: #060c15; border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.7;
    min-height: 200px; max-height: 400px; overflow-y: auto; white-space: pre;
    color: #94a3b8;
  }
  .output-area .line-header { color: var(--amber); }
  .output-area .line-data { color: var(--green); }
  .output-area .line-footer { color: var(--accent2); }
  .output-area .line-empty { color: var(--muted); }
  .stats { display: flex; gap: 20px; margin-bottom: 12px; }
  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; }
  .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: var(--mono); letter-spacing: 1px; }
  .alert { padding: 10px 14px; border-radius: 6px; font-size: 12px; font-family: var(--mono); margin-bottom: 16px; display: none; }
  .alert.error { background: rgba(239,68,68,.1); border: 1px solid var(--red); color: var(--red); display: flex; }
  .alert.success { background: rgba(16,185,129,.1); border: 1px solid var(--green); color: var(--green); display: flex; }
  .filename-display {
    font-family: var(--mono); font-size: 11px; color: var(--amber);
    background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2);
    border-radius: 4px; padding: 6px 10px; margin-bottom: 8px;
  }
  .scrollbar { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: min(860px, 96vw); max-height: 88vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 1px; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }

  /* Edit table */
  .edit-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  .edit-table th { text-align: left; padding: 6px 8px; color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
  .edit-table td { padding: 4px 4px; border-bottom: 1px solid rgba(30,58,95,.4); vertical-align: middle; }
  .edit-table tr:hover td { background: rgba(0,212,255,.03); }
  .edit-table input { padding: 5px 7px; font-size: 12px; width: 100%; background: var(--bg); border: 1px solid transparent; border-radius: 4px; }
  .edit-table input:focus { border-color: var(--accent); background: var(--surface2); }
  .btn-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
  .btn-del:hover { background: rgba(239,68,68,.1); }
  .add-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1.2fr 0.6fr 32px; gap: 6px; margin-top: 12px; align-items: center; }
  .add-row input { padding: 7px 8px; font-size: 12px; }
  .btn-add { background: var(--green); color: #000; border: none; border-radius: 6px; padding: 7px 10px; cursor: pointer; font-size: 16px; font-weight: 700; }
  .btn-add:hover { opacity: .85; }
  .btn-manage { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .btn-manage:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <h1>FBSS Import Stock Generator</h1>
  <span>— AIS Fibre / 3BB</span>
</div>

<div class="main">

  <!-- Template selector -->
  <div class="card">
    <div class="card-title">Select Template</div>
    <div class="tabs">
      <button class="tab active" onclick="setTemplate('3bb')">3BB (1300)</button>
      <button class="tab" onclick="setTemplate('1200')">FBB 1200</button>
      <button class="tab" onclick="setTemplate('1800')">FBB 1800</button>
    </div>

    <div class="form-grid">
      <div class="form-group full">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">
          <label style="margin-bottom:0">Material Code</label>
          <button class="btn-manage" onclick="openManage()">✎ Manage Records</button>
        </div>
        <select id="matCode" onchange="onMatChange()">
          <option value="">— Select Material Code —</option>
        </select>
        <div class="mat-info" id="matInfo" style="display:none">
          <div><span>Vendor: </span><strong id="mi-vendor"></strong></div>
          <div><span>Type: </span><strong id="mi-type"></strong></div>
          <div><span>Model: </span><strong id="mi-model"></strong></div>
          <div><span>SN Pattern: </span><strong id="mi-sn"></strong></div>
        </div>
      </div>

      <div class="form-group">
        <label>Company Code</label>
        <input type="text" id="compCode" value="1300" />
      </div>
      <div class="form-group">
        <label>Plant</label>
        <input type="text" id="plant" value="1303" />
      </div>
      <div class="form-group">
        <label>Storage Location</label>
        <input type="text" id="storeLoc" value="9802" />
      </div>
      <div class="form-group">
        <label>Import Date (YYYYMMDD)</label>
        <input type="text" id="importDate" placeholder="20250801" />
      </div>
      <div class="form-group">
        <label>Ship To (optional)</label>
        <input type="text" id="shipTo" placeholder="" />
      </div>
      <div class="form-group">
        <label>Quantity (จำนวน Serial No)</label>
        <div class="qty-row">
          <input type="number" id="qty" value="1" min="1" max="1000" />
          <span class="qty-hint">ระบบจะ random serial 16 หลัก</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Generate -->
  <div class="btn-row" style="margin-bottom:24px; margin-top:-8px;">
    <button class="btn btn-primary" onclick="generate()">▶ Generate TXT</button>
    <button class="btn btn-secondary" onclick="clearOutput()">✕ Clear</button>
  </div>

  <!-- Output -->
  <div class="card">
    <div class="card-title">Output</div>
    <div id="alert" class="alert"></div>
    <div id="statsRow" class="stats" style="display:none">
      <div class="stat"><div class="stat-val" id="stat-count">0</div><div class="stat-label">RECORDS</div></div>
      <div class="stat"><div class="stat-val" id="stat-size">0</div><div class="stat-label">BYTES</div></div>
    </div>
    <div id="filenameLine" class="filename-display" style="display:none"></div>
    <div class="output-area scrollbar" id="output"><span style="color:var(--muted)">// Output จะแสดงที่นี่ กด Generate เพื่อเริ่ม</span></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="downloadTxt()" id="dlBtn" style="display:none">⬇ Download .dat</button>
      <button class="btn btn-secondary" onclick="copyOutput()" id="copyBtn" style="display:none">⎘ Copy</button>
    </div>
  </div>
</div>

<!-- Manage Modal -->
<div class="modal-overlay" id="manageModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">MANAGE MATERIAL CODES</h2>
      <button class="modal-close" onclick="closeManage()">✕</button>
    </div>
    <div class="modal-body">
      <div id="alertModal" class="alert" style="margin-bottom:12px"></div>
      <table class="edit-table">
        <thead>
          <tr>
            <th>Material Code</th>
            <th>Vendor</th>
            <th>Type</th>
            <th>Model</th>
            <th>SN</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="editTableBody"></tbody>
      </table>
      <div class="add-row" style="margin-top:14px">
        <input id="new-code" placeholder="Material Code" />
        <input id="new-vendor" placeholder="Vendor" />
        <input id="new-type" placeholder="Type" />
        <input id="new-model" placeholder="Model" />
        <input id="new-sn" placeholder="SN" style="max-width:60px"/>
        <button class="btn-add" onclick="addRecord()" title="Add">+</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveManage()">✓ Save Changes</button>
      <button class="btn btn-secondary" onclick="resetManage()">↺ Reset to Default</button>
      <button class="btn btn-secondary" onclick="closeManage()" style="margin-left:auto">Cancel</button>
    </div>
  </div>
</div>

const DEFAULTS = {
  '3bb':  { compCode: '1300', plant: '1303', storeLoc: '9802', prefix: '1300_AIRNET_INV' },
  '1200': { compCode: '1200', plant: 'D212', storeLoc: '1001', prefix: '1200_AIRNET_INV' },
  '1800': { compCode: '1800', plant: 'D218', storeLoc: '1806', prefix: '1800_AIRNET_INV' },
};

function timeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0') + String(d.getSeconds()).padStart(2,'0');
}

let currentTemplate = '3bb';
let lastOutput = '';
let lastFilename = '';

// --- Manage Records ---
let editingTpl = '3bb';
const ORIG = { '3bb': JSON.parse(JSON.stringify(MAT3BB)), '1200': JSON.parse(JSON.stringify(MAT1200)), '1800': JSON.parse(JSON.stringify(MAT1800)) };
const CUSTOM = { '3bb': JSON.parse(JSON.stringify(MAT3BB)), '1200': JSON.parse(JSON.stringify(MAT1200)), '1800': JSON.parse(JSON.stringify(MAT1800)) };

function getMatData(tpl) {
  return CUSTOM[tpl];
}

function openManage() {
  editingTpl = currentTemplate;
  document.getElementById('modalTitle').textContent = 'MANAGE — ' + editingTpl.toUpperCase();
  renderEditTable();
  document.getElementById('manageModal').classList.add('open');
  ['new-code','new-vendor','new-type','new-model','new-sn'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('alertModal').className = 'alert';
}
function closeManage() { document.getElementById('manageModal').classList.remove('open'); }

function renderEditTable() {
  const data = CUSTOM[editingTpl];
  const tbody = document.getElementById('editTableBody');
  tbody.innerHTML = '';
  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = [r[0],r[1],r[2],r[3],r[4]].map((v,ci) =>
      '<td><input value="' + escHtml(String(v)) + '" onchange="CUSTOM[editingTpl][' + i + '][' + ci + ']=this.value" /></td>'
    ).join('') + '<td><button class="btn-del" onclick="deleteRecord(' + i + ')" title="Delete">✕</button></td>';
    tbody.appendChild(tr);
  });
}

function deleteRecord(i) {
  CUSTOM[editingTpl].splice(i, 1);
  renderEditTable();
}

function addRecord() {
  const code = document.getElementById('new-code').value.trim();
  const vendor = document.getElementById('new-vendor').value.trim();
  const type = document.getElementById('new-type').value.trim();
  const model = document.getElementById('new-model').value.trim();
  const sn = document.getElementById('new-sn').value.trim() || 'B';
  const alertEl = document.getElementById('alertModal');
  if (!code) { alertEl.textContent = '⚠ กรุณากรอก Material Code'; alertEl.className = 'alert error'; return; }
  CUSTOM[editingTpl].push([code, vendor, type, model, sn]);
  renderEditTable();
  ['new-code','new-vendor','new-type','new-model','new-sn'].forEach(id => document.getElementById(id).value = '');
  alertEl.className = 'alert';
}

function saveManage() {
  // Sync edited input values back (in case user typed without blur)
  const rows = document.getElementById('editTableBody').querySelectorAll('tr');
  rows.forEach((tr, i) => {
    const inputs = tr.querySelectorAll('input');
    inputs.forEach((inp, ci) => { CUSTOM[editingTpl][i][ci] = inp.value; });
  });
  populateMat(editingTpl);
  document.getElementById('matInfo').style.display = 'none';
  document.getElementById('matCode').value = '';
  closeManage();
}

function resetManage() {
  if (!confirm('Reset กลับ default ทั้งหมดสำหรับ ' + editingTpl.toUpperCase() + '?')) return;
  CUSTOM[editingTpl] = JSON.parse(JSON.stringify(ORIG[editingTpl]));
  renderEditTable();
}

function setTemplate(tpl) {
  currentTemplate = tpl;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['3bb','1200','1800'][i] === tpl);
  });
  const d = DEFAULTS[tpl];
  document.getElementById('compCode').value = d.compCode;
  document.getElementById('plant').value = d.plant;
  document.getElementById('storeLoc').value = d.storeLoc;
  populateMat(tpl);
  document.getElementById('matInfo').style.display = 'none';
}

function populateMat(tpl) {
  const sel = document.getElementById('matCode');
  const data = getMatData(tpl);
  sel.innerHTML = '<option value="">— Select Material Code —</option>';
  data.forEach(r => {
    const o = document.createElement('option');
    o.value = r[0];
    o.textContent = r[0] + ' [' + r[2] + '] ' + r[3];
    o.dataset.v = r[1]; o.dataset.t = r[2]; o.dataset.m = r[3]; o.dataset.s = r[4];
    sel.appendChild(o);
  });
}

function onMatChange() {
  const sel = document.getElementById('matCode');
  const opt = sel.selectedOptions[0];
  const info = document.getElementById('matInfo');
  if (!opt || !opt.value) { info.style.display = 'none'; return; }
  document.getElementById('mi-vendor').textContent = opt.dataset.v;
  document.getElementById('mi-type').textContent = opt.dataset.t;
  document.getElementById('mi-model').textContent = opt.dataset.m;
  document.getElementById('mi-sn').textContent = opt.dataset.s;
  info.style.display = 'flex';
}

function randSerial16() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let s = '';
  for (let i = 0; i < 16; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return '' + y + m + day;
}

function showAlert(msg, type) {
  const a = document.getElementById('alert');
  a.textContent = msg;
  a.className = 'alert ' + type;
}
function clearAlert() {
  const a = document.getElementById('alert');
  a.className = 'alert';
}

function generate() {
  clearAlert();
  const matCode = document.getElementById('matCode').value;
  if (!matCode) { showAlert('⚠ กรุณาเลือก Material Code', 'error'); return; }

  const compCode = document.getElementById('compCode').value.trim();
  const plant = document.getElementById('plant').value.trim();
  const storeLoc = document.getElementById('storeLoc').value.trim();
  const importDate = document.getElementById('importDate').value.trim() || todayStr();
  const shipTo = document.getElementById('shipTo').value.trim();
  const qty = parseInt(document.getElementById('qty').value) || 1;

  if (!/^\d{8}$/.test(importDate)) { showAlert('⚠ Import Date ต้องเป็น YYYYMMDD (8 ตัวเลข)', 'error'); return; }

  const sel = document.getElementById('matCode');
  const opt = sel.selectedOptions[0];
  const vendor = opt.dataset.v;
  const spType = opt.dataset.t;
  const model = opt.dataset.m;
  const snPat = opt.dataset.s;

  const d = DEFAULTS[currentTemplate];
  const filename = d.prefix + '_' + importDate + '_' + timeStr() + '.dat';
  lastFilename = filename;

  // Dummy ONU: FBB 1200 & 1800 only, when Spare Parts Type = "Wifi router"
  const isWifiRouter = spType === 'Wifi router';
  const hasDummyONU = (currentTemplate === '1200' || currentTemplate === '1800') && isWifiRouter;
  const dummyONUCode = '20000004';
  const DUMMY_ONU = { vendor: 'AIS', type: 'ONU', model: 'Dummy ONU', sn: 'B' };

  const lines = [];
  lines.push('01|' + filename);

  let totalRows = 0;
  for (let i = 0; i < qty; i++) {
    const sn = randSerial16();
    const row = '02|' + sn + '|' + importDate + '|' + matCode + '|' + compCode + '|' + plant + '|' + storeLoc + '||' + shipTo + '|' + vendor + '|' + spType + '|' + model + '|' + snPat;
    lines.push(row);
    totalRows++;

    if (hasDummyONU) {
      const snD = sn + 'D';
      const rowD = '02|' + snD + '|' + importDate + '|' + dummyONUCode + '|' + compCode + '|' + plant + '|' + storeLoc + '||' + shipTo + '|' + DUMMY_ONU.vendor + '|' + DUMMY_ONU.type + '|' + DUMMY_ONU.model + '|' + DUMMY_ONU.sn;
      lines.push(rowD);
      totalRows++;
    }
  }
  lines.push('09|' + totalRows);

  lastOutput = lines.join('\n');

  // Render colored output
  const outEl = document.getElementById('output');
  outEl.innerHTML = lines.map((l, i) => {
    if (i === 0) return '<span class="line-header">' + escHtml(l) + '</span>';
    if (i === lines.length-1) return '<span class="line-footer">' + escHtml(l) + '</span>';
    if (hasDummyONU && l.includes('|' + dummyONUCode + '|')) return '<span style="color:#a78bfa">' + escHtml(l) + '</span>';
    return '<span class="line-data">' + escHtml(l) + '</span>';
  }).join('\n');

  // Stats
  document.getElementById('stat-count').textContent = hasDummyONU ? qty + ' CPE + ' + qty + ' ONU (' + totalRows + ' rows)' : qty;
  document.getElementById('stat-size').textContent = lastOutput.length;
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('filenameLine').style.display = 'block';
  document.getElementById('filenameLine').textContent = '📄 ' + filename;
  document.getElementById('dlBtn').style.display = '';
  document.getElementById('copyBtn').style.display = '';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function downloadTxt() {
  const blob = new Blob([lastOutput], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = lastFilename;
  a.click();
}

function copyOutput() {
  navigator.clipboard.writeText(lastOutput).then(() => {
    showAlert('✓ Copied to clipboard!', 'success');
    setTimeout(clearAlert, 2000);
  });
}

function clearOutput() {
  document.getElementById('output').innerHTML = '<span style="color:var(--muted)">// Output จะแสดงที่นี่ กด Generate เพื่อเริ่ม</span>';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('filenameLine').style.display = 'none';
  document.getElementById('dlBtn').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
  clearAlert();
  lastOutput = '';
}

// Init
populateMat('3bb');
document.getElementById('importDate').value = (function(){
  const d = new Date();
  return '' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
})();
</script>
